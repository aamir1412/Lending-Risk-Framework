# This is a Databricks asset bundle definition for my_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: Lending-Risk-Framework
  uuid: 4eece1e1-97de-4c3d-96e6-f685a248387c

include:
  - resources/*.yml
  - resources/*/*.yml

# Define variables with defaults
variables:
  catalog_name:
    description: "The Unity Catalog name"
    default: lending_risk_dev
  storage_account:
    description: "The ADLS Gen2 storage account name"
    default: adlsg2lendingdev

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.    
    default: true
    presets:
      name_prefix: (dev_env ${workspace.current_user.short_name})
      source_linked_deployment: false
    variables:
      catalog_name: lending_risk_dev
      storage_account: adlsg2lendingdev      
    workspace:
      host: https://adb-7405614510634503.3.azuredatabricks.net
      # ESSENTIAL: Deploy to shared path so Prod-SP can read notebooks
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    
    # ESSENTIAL: Force the job to execute as the SP for job run
    run_as:
      service_principal_name: 55dd8216-5bae-4dc3-b04d-277ef045b5db
    permissions:
      - level: CAN_MANAGE
        group_name: users

  prod:
    # Override variables for the production environment
    variables:
      catalog_name: lending_risk_prod
      storage_account: adlsg2lendingprod
    workspace:
      host: https://adb-7405613588252539.19.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/aamir.mscse@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/PROD/${bundle.target}

    run_as:
      service_principal_name: 55dd8216-5bae-4dc3-b04d-277ef045b5db
    permissions:
      - level: CAN_MANAGE
        group_name: users # <--- SILENCES WARNING
      - user_name: aamir.mscse@gmail.com
        level: CAN_MANAGE

    permissions:
      # Grant the execution identity permission to read/run the code
      - service_principal_name: 55dd8216-5bae-4dc3-b04d-277ef045b5db
        level: CAN_RUN
      # Keep your management access
      - user_name: aamir.mscse@gmail.com
        level: CAN_MANAGE
      # Silences the shared folder warning
      - group_name: users
        level: CAN_MANAGE
