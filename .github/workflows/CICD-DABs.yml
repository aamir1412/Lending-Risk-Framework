name: Lending-Risk-Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    environment: DEV
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: https://adb-7405614510634503.3.azuredatabricks.net
      DATABRICKS_CLIENT_ID: cbcac33d-d342-4114-8956-65623a114119
    steps:
      - uses: actions/checkout@v4
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: deploy-dev
        run: databricks bundle deploy -t dev

  deploy-prod:
    runs-on: ubuntu-latest
    needs: deploy-dev # <--- WAITS FOR DEV TO SUCCEED
    environment: PROD # <--- TRIGGERS THE "ASK ME" OPTION
    env:
      DATABRICKS_AUTH_TYPE: github-oidc
      DATABRICKS_HOST: https://adb-7405613588252539.19.azuredatabricks.net
      DATABRICKS_CLIENT_ID: cbcac33d-d342-4114-8956-65623a114119
    steps:
      - uses: actions/checkout@v4
      - name: Install Databricks CLI
        uses: databricks/setup-cli@main
      - name: deploy-prod
        run: databricks bundle deploy -t prod