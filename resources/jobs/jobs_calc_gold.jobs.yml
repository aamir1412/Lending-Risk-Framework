resources:
  jobs:
    calc_layer_gold:
      name: calc_layer_gold
      run_as:
        service_principal_name: 55dd8216-5bae-4dc3-b04d-277ef045b5db
        
      tasks:
        - task_key: calc_defaulters_performance
          notebook_task:
            notebook_path: ../../src/notebooks/03_gold/calc_defaulters_performance.ipynb            
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              raw_path: "abfss://raw@${var.storage_account}.dfs.core.windows.net/"
              job_run_id: "{{job.run_id}}" 

        - task_key: calc_financial_performance           
          notebook_task:
            notebook_path: ../../src/notebooks/03_gold/calc_financial_performance.ipynb            
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              raw_path: "abfss://raw@${var.storage_account}.dfs.core.windows.net/"
              job_run_id: "{{job.run_id}}" 

        - task_key: calc_payment_performance           
          notebook_task:
            notebook_path: ../../src/notebooks/03_gold/calc_payment_performance.ipynb            
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              raw_path: "abfss://raw@${var.storage_account}.dfs.core.windows.net/"
              job_run_id: "{{job.run_id}}" 

        - task_key: customers_loan_score
          depends_on:            
            - task_key: calc_defaulters_performance
            - task_key: calc_financial_performance
            - task_key: calc_payment_performance              
          notebook_task:
            notebook_path: ../../src/notebooks/03_gold/customers_loan_score.ipynb            
            source: WORKSPACE
            base_parameters:
              catalog_name: ${var.catalog_name}
              raw_path: "abfss://raw@${var.storage_account}.dfs.core.windows.net/"
              job_run_id: "{{job.run_id}}" 
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: job_run_id
          default: "{{job.run_id}}"
      performance_target: PERFORMANCE_OPTIMIZED
