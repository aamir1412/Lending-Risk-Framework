resources:
  jobs:
    ingest_layer_bronze:
      name: ingest_layer_bronze
      tasks:
        - task_key: ingest_customers
          notebook_task:
            notebook_path: ../../src/notebooks/01_bronze/ingest_customers
            source: WORKSPACE
        - task_key: ingest_defaulters
          depends_on:
            - task_key: ingest_customers
          notebook_task:
            notebook_path: ../../src/notebooks/01_bronze/ingest_defaulters
            source: WORKSPACE
        - task_key: ingest_loans
          depends_on:
            - task_key: ingest_defaulters
          notebook_task:
            notebook_path: ../../src/notebooks/01_bronze/ingest_loans
            source: WORKSPACE
        - task_key: ingest_repayments
          depends_on:
            - task_key: ingest_loans
          notebook_task:
            notebook_path: ../../src/notebooks/01_bronze/ingest_repayments
            source: WORKSPACE
      queue:
        enabled: true
      parameters:
        - name: job_run_id
          default: "{{job.run_id}}"
      performance_target: PERFORMANCE_OPTIMIZED
