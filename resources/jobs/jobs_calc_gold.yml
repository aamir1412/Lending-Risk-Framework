resources:
  jobs:
    calc_layer_gold:
      name: calc_layer_gold
      tasks:
        - task_key: calc_defaulters_performance
          notebook_task:
            notebook_path: ../../src/notebooks/03_gold/calc_defaulters_performance.ipynb            
            source: WORKSPACE
        - task_key: calc_financial_performance
          depends_on:
            - task_key: calc_defaulters_performance
          notebook_task:
            notebook_path: ../../src/notebooks/03_gold/calc_financial_performance.ipynb            
            source: WORKSPACE
        - task_key: calc_payment_performance
          depends_on:
            - task_key: calc_financial_performance
          notebook_task:
            notebook_path: ../../src/notebooks/03_gold/calc_payment_performance.ipynb            
            source: WORKSPACE
        - task_key: customers_loan_score
          depends_on:
            - task_key: calc_payment_performance
          notebook_task:
            notebook_path: ../../src/notebooks/03_gold/customers_loan_score.ipynb            
            source: WORKSPACE
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: lending_risk_dev
        - name: job_run_id
          default: "{{job.run_id}}"
      performance_target: PERFORMANCE_OPTIMIZED
