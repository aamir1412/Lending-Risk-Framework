resources:
  jobs:
    refine_layer_silver:
      name: refine_layer_silver
      tasks:
        - task_key: ref_loan_grading_scale
          notebook_task:
            notebook_path: ../../src/notebooks/02_silver/ref_loan_grading_scale.ipynb
            source: WORKSPACE
        - task_key: ref_loan_purposes
          depends_on:
            - task_key: ref_loan_grading_scale
          notebook_task:
            notebook_path: ../../src/notebooks/02_silver/ref_loan_purposes.ipynb
            source: WORKSPACE
        - task_key: ref_score_points_mapping
          depends_on:
            - task_key: ref_loan_purposes
          notebook_task:
            notebook_path: ../../src/notebooks/02_silver/ref_score_points_mapping.ipynb
            source: WORKSPACE
        - task_key: refine_customers
          depends_on:
            - task_key: ref_score_points_mapping
          notebook_task:
            notebook_path: ../../src/notebooks/02_silver/refine_customers.ipynb
            source: WORKSPACE
        - task_key: refine_defaulters
          depends_on:
            - task_key: refine_customers
          notebook_task:
            notebook_path: ../../src/notebooks/02_silver/refine_defaulters.ipynb
            source: WORKSPACE
        - task_key: refine_loans
          depends_on:
            - task_key: refine_defaulters
          notebook_task:
            notebook_path: ../../src/notebooks/02_silver/refine_loans.ipynb
            source: WORKSPACE
        - task_key: refine_repayments
          depends_on:
            - task_key: refine_loans
          notebook_task:
            notebook_path: ../../src/notebooks/02_silver/refine_repayments.ipynb
            source: WORKSPACE
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: lending_risk_dev
      performance_target: PERFORMANCE_OPTIMIZED
